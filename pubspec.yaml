name: tnt
description: World's finest and first complete fitness application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Routing
  go_router: ^14.2.7

  # UI & Framework
  cupertino_icons: ^1.0.6
  responsive_framework: ^1.5.1
  auto_size_text: ^3.0.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  multi_select_flutter: ^4.1.3

  # Hardware, APIs & Services
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  geolocator: ^14.0.2
  connectivity_plus: ^7.0.0
  permission_handler: ^12.0.1
  camera: ^0.12.0+1
  torch_light: ^1.0.1
  audioplayers: ^6.0.0
  file_picker: ^10.3.10

  # Firebase & Notifications
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0

  # Storage & Local Databases
  isar: ^3.1.0+1
  drift: ^2.18.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

